<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: white; overflow-x: hidden; }

        /* --- Password Page (Login) --- */
        #login-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; flex-start;
            padding-top: 30%;z-index: 1000;
        }
        
#bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;

    transform: translate(-50%, -50%);
    object-fit: cover; 
}


@media screen and (max-width: 768px) {
    #bg-video {
        width: 100vw;
        height: 100vh;
    }
}

        
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center; width: 90%; max-width: 400px;
        }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            margin-bottom: 20px; text-align: center; font-size: 16px;
        }
        .btn-enter {
            background: #ff6b6b; color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-size: 18px; width: 50%;
             display: block;
             margin: 0 auto; 
        }

        /* --- Page 2 Content --- */
        #main-page {
            display: none; min-height: 100vh;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover; padding: 20px; text-align: center;
        }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .gallery img, .v-grid video { 
            width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 2px solid #fff; 
        }
        .v-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        /* --- Timer Section --- */
        .timer-container {
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px;
            border: 3px solid #00ff00;
            display: inline-block; width: 100%; max-width: 400px;
            transition: 0.3s;
        }
        #timer-display { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: #00ff00; }

        /* Error Animation: မှားယွင်းမှုအတွက် နီ/စိမ်း အလှည့်ကျ */
        .error-mode { animation: errorFlash 0.8s infinite; }
        @keyframes errorFlash {
            0%, 49% { color: #ff0000; border-color: #ff0000; }
            50%, 100% { color: #00ff00; border-color: #00ff00; }
        }

        /* Success/Permanently Stopped: အနီရောင် သီးသန့် */
        .timer-permanently-stopped { 
            color: #ff0000 !important; 
            border-color: #ff0000 !important; 
            animation: blinkRed 0.5s infinite; 
        }
        @keyframes blinkRed { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #stopCode { background: #222; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <audio id="s1" src="alarm1.mp3"></audio>
    <audio id="s2" src="alarm2.mp3"></audio>
    <audio id="s3" src="alarm3.mp3"></audio>
    <audio id="s4" src="alarm4.mp3"></audio>

    <div id="login-page">
        <video autoplay muted loop id="bg-video"><source src="bgvideo.mp4" type="video/mp4"></video>
        <div class="glass-box">
            <h3 style="margin-bottom:15px;">Enter Password</h3>
            <input type="password" id="passInput" placeholder="write 6-letter">
            <button class="btn-enter" onclick="checkLogin()">Enter</button>
        </div>
    </div>

    <div id="main-page">
        <div id="content-block">
            <div class="gallery">
      <img src="b1.jpg"><img src="b2.jpg">
      <img src="b3.jpg"><img src="b4.jpg">
      
      </div>
      
   <div class="v-grid">
        <video src="bgvideo.mp4" controls></video>
        <video src="bgvideo.mp4" controls></video>
            </div>
        </div>

        <div class="timer-container" id="timerBox">
            <p style="font-size: 12px; color: #ccc;">သတ်မှတ်ချိန်ပြည့်ပါကSocialMedia ပေါ်ရောက်မည်။  </p>
            <p style="font-size: 12px; color: #ccc;">
              Stop Password ဖြင့်ရပ်တန့်နိုင်သည်။ </p>
            
            <div id="timer-display">00ရက်, 00:00:00</div>
            <div id="input-zone">
                <input type="password" id="stopCode" placeholder="Stop Password">
                <button class="btn-enter" style="background:#444;" onclick="checkStopTimer()">Stop Timer</button>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date("April 9, 2026 12:00:00").getTime();
        let isStopped = false;
        let timerInterval;

        // Check if already finished in previous session
        window.onload = function() {
            if(localStorage.getItem('timerFinished') === 'true') {
                isStopped = true;
                // Content ပျောက်ထားမယ်
                document.getElementById('content-block').style.display = 'none';
                // Input zone ပျောက်ထားမယ်
                document.getElementById('input-zone').style.display = 'none';
                // Timer ကို အနီရောင်နဲ့ 0 ထားမယ်
                const timerBox = document.getElementById('timerBox');
                const timerDisplay = document.getElementById('timer-display');
                timerDisplay.innerHTML = "0ရက် 00 : 00 : 00";
                timerBox.classList.add('timer-permanently-stopped');
            }
        };

        function checkLogin() {
            if(document.getElementById('passInput').value === "342026") {
                document.getElementById('s2').play();
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'block';
                if(!isStopped) {
                    runTimer();
                }
            } else { 
                document.getElementById('s1').play(); 
            }
        }

        function runTimer() {
            timerInterval = setInterval(() => {
                if(isStopped) return;
                const now = new Date().getTime();
                const d = targetDate - now;
                
                const days = Math.floor(d / (1000*60*60*24));
                const h = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((d % (1000*60*60)) / (1000*60));
                const s = Math.floor((d % (1000*60)) / 1000);

                if (d < 0) {
                    clearInterval(timerInterval);
                    document.getElementById("timer-display").innerHTML = "POSTED(DONED)";
                } else {
                    document.getElementById("timer-display").innerHTML = 
                        `${days}ရက်, ${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
                }
            }, 1000);
        }

        function checkStopTimer() {
            const code = document.getElementById('stopCode').value;
            const timerBox = document.getElementById('timerBox');
            const timerDisplay = document.getElementById('timer-display');

            if(code === "123690") {
                isStopped = true;
                clearInterval(timerInterval);
                document.getElementById('s4').play();
                
                // Password မှန်တာနဲ့ ချက်ချင်း 0 ပေးပြီး အနီရောင်ပြောင်းမယ်
                timerDisplay.innerHTML = "POST DELETED";
                timerBox.classList.remove('error-mode');
                timerBox.classList.add('timer-permanently-stopped');
                document.getElementById('input-zone').style.display = 'none';

                // ၅ စက္ကန့်အကြာမှာ ပုံတွေဖျောက်ပြီး Session သိမ်းမယ်
                setTimeout(() => {
                    document.getElementById('content-block').style.display = 'none';
                    localStorage.setItem('timerFinished', 'true');
                }, 5000);
            } else {
                // မှားလျှင် ၆ စက္ကန့်ကြာ နီ/စိမ်း ဖြစ်မယ်
                document.getElementById('s3').play();
                timerBox.classList.add('error-mode'); 
                setTimeout(() => {
                    if(!isStopped) timerBox.classList.remove('error-mode');
                }, 6000);
            }
        }
    </script>
</body>
</html>
